<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSC Baliapal – Secure User Access</title>
    <meta name="description" content="Secure login and registration portal for CSC Baliapal Janaseba Kendra digital services.">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --navy:    #001f4d;
            --blue:    #003399;
            --gold:    #f5a623;
            --light:   #e8f0fe;
            --white:   #ffffff;
            --gray:    #6b7280;
            --success: #16a34a;
            --error:   #dc2626;
        }

        * { margin:0; padding:0; box-sizing:border-box; }

        body {
            font-family: 'Inter', 'Segoe UI', sans-serif;
            min-height: 100vh;
            background: #001f4d url('../Assets/photo 08.png') no-repeat center center / cover;
            display: flex;
            align-items: center;
            justify-content: flex-start; /* Align left */
            padding: 24px 8%; /* Spacer from the left edge */
            overflow-x: hidden;
            position: relative;
        }

        /* Group the logo and card together */
        .login-wrapper {
            width: 100%;
            max-width: 460px;
            position: relative;
            z-index: 10;
        }

        /* premium dark gradient overlay over the image */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: linear-gradient(135deg, rgba(0,31,77,0.92) 0%, rgba(0,51,153,0.80) 50%, rgba(0,80,204,0.65) 100%);
            z-index: 0;
        }

        /* floating subtle light glows */
        body::after {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                radial-gradient(circle at 15% 25%, rgba(245,166,35,.25) 0%, transparent 45%),
                radial-gradient(circle at 85% 70%, rgba(255,255,255,.15) 0%, transparent 40%);
            pointer-events: none;
            z-index: 0;
        }

        /* ── Logo Badge ── */
        .page-badge {
            text-align: center;
            margin-bottom: 24px;
            animation: fadeDown .7s ease both;
        }
        .lock-icon {
            width: 72px; height: 72px;
            background: #ffffff;
            border: 2.5px solid var(--gold);
            border-radius: 50%;
            display: inline-flex; align-items: center; justify-content: center;
            box-shadow: 0 8px 24px rgba(245,166,35,.5);
            margin-bottom: 10px;
            overflow: hidden;
            animation: pulseLock 2.5s ease-in-out infinite;
        }
        .lock-icon img {
            width: 85%;
            height: auto;
            object-fit: contain;
        }
        @keyframes pulseLock {
            0%,100% { box-shadow: 0 8px 24px rgba(245,166,35,.5); transform: scale(1); }
            50%      { box-shadow: 0 12px 36px rgba(245,166,35,.8); transform: scale(1.06); }
        }
        .page-badge h1 { color: var(--white); font-size: 1.02rem; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; text-shadow: 0 2px 10px rgba(0,0,0,0.5); }
        .page-badge p  { color: rgba(255,255,255,.75); font-size: .76rem; margin-top: 4px; letter-spacing: 1px; text-shadow: 0 1px 5px rgba(0,0,0,0.5); }

        /* ── Card ── (White with golden border effect) */
        .auth-card {
            background: #ffffff;
            border: 2px solid var(--gold);
            border-radius: 20px;
            padding: 36px 34px 28px;
            box-shadow: 0 24px 60px rgba(0,0,0,.6);
            animation: fadeUp .7s .1s ease both;
            position: relative;
            overflow: hidden;
        }
        .auth-card::before {
            content:'';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 5px;
            background: linear-gradient(90deg, var(--navy), var(--gold), var(--navy));
            background-size: 200%;
            animation: shimmer 3s linear infinite;
        }
        @keyframes shimmer { 0% { background-position:0% 0; } 100% { background-position:200% 0; } }

        .card-header { text-align: center; margin-bottom: 22px; }
        .card-header h2 { color: var(--navy); font-size: 1.4rem; font-weight: 800; letter-spacing: .5px; }
        .card-header p  { color: var(--gray); font-size: .82rem; margin-top: 5px; }

        /* ── Mode Tabs ── */
        .mode-tabs {
            display: flex;
            background: var(--light);
            border-radius: 10px;
            padding: 4px;
            margin-bottom: 20px;
        }
        .mode-tab {
            flex: 1; padding: 9px; text-align: center;
            border-radius: 8px; font-size: .84rem; font-weight: 600;
            cursor: pointer; transition: all .3s;
            color: var(--gray); border: none; background: transparent;
            font-family: inherit;
        }
        .mode-tab.active {
            background: var(--navy); color: var(--white);
            box-shadow: 0 4px 12px rgba(0,51,153,.3);
        }

        /* ── Section divider ── */
        .section-divider {
            font-size: .72rem;
            font-weight: 700;
            color: var(--navy);
            text-transform: uppercase;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            gap: 8px;
            margin: 4px 0 14px;
        }
        .section-divider::before, .section-divider::after {
            content:''; flex:1; height:1px;
            background: linear-gradient(90deg, transparent, rgba(0,51,153,.2), transparent);
        }

        /* ── Input groups ── */
        .input-group { margin-bottom: 15px; }
        .input-group label {
            display: block; font-size: .81rem;
            font-weight: 600; color: #374151; margin-bottom: 6px;
        }
        .input-wrap { position: relative; }
        .input-wrap span.ico {
            position: absolute; left: 12px; top: 50%;
            transform: translateY(-50%); font-size: 15px;
            color: var(--gray); pointer-events: none;
        }
        .input-wrap input {
            width: 100%; padding: 11px 13px 11px 38px;
            border: 1.5px solid #d1d5db; border-radius: 9px;
            font-size: .92rem; font-family: inherit; color: #111827;
            transition: border-color .25s, box-shadow .25s;
            background: #f9fafb;
        }
        .input-wrap input::placeholder { color: #9ca3af; }
        .input-wrap input:focus {
            outline: none; border-color: var(--blue);
            box-shadow: 0 0 0 3px rgba(0,51,153,.12);
            background: var(--white);
        }

        /* Extra registration fields shown/hidden */
        .reg-only { display: none; }

        /* ── Button ── */
        .submit-btn {
            width: 100%; padding: 13px;
            background: linear-gradient(135deg, var(--navy), var(--blue));
            color: var(--white); border: none; border-radius: 10px;
            font-size: .98rem; font-weight: 700; font-family: inherit;
            cursor: pointer; letter-spacing: .5px;
            transition: all .3s; box-shadow: 0 6px 20px rgba(0,51,153,.35);
            margin-top: 4px;
        }
        .submit-btn:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 10px 28px rgba(0,51,153,.45); }
        .submit-btn:active:not(:disabled) { transform: translateY(0); }
        .submit-btn:disabled { background: #9ca3af; box-shadow: none; cursor: not-allowed; }

        /* ── Status ── */
        #statusMsg {
            display: none; margin-top: 14px;
            padding: 11px 14px; border-radius: 8px;
            font-size: .84rem; font-weight: 500; text-align: center;
        }
        #statusMsg.success { background:#dcfce7; color:var(--success); border:1px solid #bbf7d0; }
        #statusMsg.error   { background:#fee2e2; color:var(--error);   border:1px solid #fecaca; }
        #statusMsg.info    { background:#dbeafe; color:#1d4ed8;        border:1px solid #bfdbfe; }

        /* ── Toggle hint ── */
        .card-footer-note { text-align: center; margin-top: 18px; font-size: .78rem; color: var(--gray); }
        .card-footer-note a { color: var(--blue); text-decoration: none; font-weight: 600; }
        .card-footer-note a:hover { text-decoration: underline; }

        /* ── Site credit ── */
        .site-credit {
            margin-top: 20px; color: rgba(255,255,255,.45);
            font-size: .74rem; text-align: center;
            animation: fadeUp .7s .25s ease both;
        }

        @keyframes fadeDown { from { opacity:0; transform:translateY(-20px); } to { opacity:1; transform:translateY(0); } }
        @keyframes fadeUp   { from { opacity:0; transform:translateY(20px);  } to { opacity:1; transform:translateY(0); } }

        /* ── Back Button ── */
        .back-btn {
            position: absolute;
            top: 24px;
            left: 24px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.3);
            color: #ffffff;
            padding: 8px 16px;
            border-radius: 8px;
            text-decoration: none;
            font-size: .85rem;
            font-weight: 600;
            transition: all .25s ease;
            z-index: 20;
        }
        .back-btn:hover {
            background: rgba(255,255,255,0.25);
            transform: translateX(-3px);
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        @media (max-width:768px) {
            body { justify-content: center; padding: 24px 20px; align-items: center; }
            .login-wrapper { max-width: 440px; margin-top: 40px; }
            .back-btn { top: 16px; left: 16px; }
        }
        @media (max-width:480px) { .auth-card { padding: 26px 18px 22px; } }
    </style>
</head>
<body>

    <!-- Back to Dashboard -->
    <a href="after_log.html" class="back-btn">
        <span style="font-size: 1.1rem;">←</span> Return to Portal
    </a>

    <div class="login-wrapper">
        <!-- Logo Badge -->
        <div class="page-badge">
            <div class="lock-icon"><img src="../Assets/Logo.png" alt="Logo"></div>
            <h1>CSC Baliapal Janaseba Kendra</h1>
            <p>Secure Digital Services Portal</p>
        </div>

        <!-- Auth Card -->
        <div class="auth-card">
            <div class="card-header">
                <h2 id="titleText">Welcome Back</h2>
                <p id="subText">Sign in to access all portal features</p>
            </div>

        <!-- Mode Tabs -->
        <div class="mode-tabs">
            <button class="mode-tab active" id="loginTab"    onclick="setMode('login')">🔑 Sign In</button>
            <button class="mode-tab"        id="registerTab" onclick="setMode('register')">📋 Register</button>
        </div>

        <form id="mainAuthForm" novalidate>

            <!-- ── REGISTRATION-ONLY FIELDS ── -->
            <div class="reg-only" id="regFields">
                <div class="section-divider">Personal Details</div>

                <div class="input-group">
                    <label for="userName">Full Name</label>
                    <div class="input-wrap">
                        <span class="ico">👤</span>
                        <input type="text" id="userName" placeholder="Enter your full name" autocomplete="name">
                    </div>
                </div>

                <div class="input-group">
                    <label for="userAddress">Address</label>
                    <div class="input-wrap">
                        <span class="ico">🏠</span>
                        <input type="text" id="userAddress" placeholder="Village / Town, District">
                    </div>
                </div>

                <div class="input-group">
                    <label for="userCscId">CSC ID</label>
                    <div class="input-wrap">
                        <span class="ico">🪪</span>
                        <input type="text" id="userCscId" placeholder="e.g. MP100000001CSC">
                    </div>
                </div>

                <div class="input-group">
                    <label for="userMob">Mobile Number</label>
                    <div class="input-wrap">
                        <span class="ico">📱</span>
                        <input type="tel" id="userMob" placeholder="10-digit mobile number" maxlength="10">
                    </div>
                </div>

                <div class="section-divider">Login Credentials</div>
            </div>

            <!-- ── EMAIL & PASSWORD (shown always) ── -->
            <div class="input-group">
                <label for="userEmail">Email Address</label>
                <div class="input-wrap">
                    <span class="ico">✉️</span>
                    <input type="email" id="userEmail" placeholder="you@example.com" required autocomplete="email">
                </div>
            </div>

            <div class="input-group">
                <label for="userPass">Password</label>
                <div class="input-wrap">
                    <span class="ico">🔒</span>
                    <input type="password" id="userPass" placeholder="Enter your password" required autocomplete="current-password">
                </div>
            </div>

            <button type="submit" id="actionBtn" class="submit-btn">🔑 Sign In</button>
        </form>

        <div id="statusMsg"></div>

        <div class="card-footer-note">
            <span id="toggleHint">New user? <a href="#" onclick="setMode('register'); return false;">Create an account</a></span>
        </div>
    </div>
    
    <!-- Site Credit inside the wrapper -->
    <div class="site-credit">
        © 2026 Graphic Digital Service Portal · All Rights Reserved
    </div>
</div>

    <script>
        let currentMode = 'login';
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbx0tUjOnslrRUyhboL5rB2UqJUHE9czTwyPT1haV8sCa2imCVfFWkrPoYrVV29LYwXf/exec";

        function setMode(mode) {
            currentMode = mode;
            const regFields = document.getElementById('regFields');
            const title     = document.getElementById('titleText');
            const sub       = document.getElementById('subText');
            const btn       = document.getElementById('actionBtn');
            const hint      = document.getElementById('toggleHint');
            const loginTab  = document.getElementById('loginTab');
            const regTab    = document.getElementById('registerTab');
            const status    = document.getElementById('statusMsg');

            status.style.display = 'none';

            if (mode === 'register') {
                regFields.style.display = 'block';
                title.innerText = 'Create Account';
                sub.innerText   = 'Register to access all portal features';
                btn.innerHTML   = '📋 Create Account';
                hint.innerHTML  = "Already registered? <a href='#' onclick=\"setMode('login'); return false;\">Sign In</a>";
                loginTab.classList.remove('active');
                regTab.classList.add('active');
            } else {
                regFields.style.display = 'none';
                title.innerText = 'Welcome Back';
                sub.innerText   = 'Sign in to access all portal features';
                btn.innerHTML   = '🔑 Sign In';
                hint.innerHTML  = "New user? <a href='#' onclick=\"setMode('register'); return false;\">Create an account</a>";
                regTab.classList.remove('active');
                loginTab.classList.add('active');
            }
        }

        function showStatus(msg, type) {
            const el = document.getElementById('statusMsg');
            el.innerText = msg;
            el.className = type;
            el.style.display = 'block';
        }

        document.getElementById('mainAuthForm').addEventListener('submit', function(e) {
            e.preventDefault();

            const email = document.getElementById('userEmail').value.trim();
            const pass  = document.getElementById('userPass').value;
            const btn   = document.getElementById('actionBtn');

            if (!email || !pass) { showStatus('⚠️ Please fill in Email and Password.', 'error'); return; }

            /* ── REGISTRATION ── */
            if (currentMode === 'register') {
                const name    = document.getElementById('userName').value.trim();
                const address = document.getElementById('userAddress').value.trim();
                const cscId   = document.getElementById('userCscId').value.trim();
                const mob     = document.getElementById('userMob').value.trim();

                if (!name) { showStatus('⚠️ Please enter your full name.', 'error'); return; }

                // Save profile to localStorage keyed by email
                const profile = { name, address, cscId, mob, email };
                const users = JSON.parse(localStorage.getItem('csc_users') || '{}');
                users[email] = profile;
                localStorage.setItem('csc_users', JSON.stringify(users));

                btn.disabled = true;
                showStatus('⏳ Saving registration…', 'info');

                // Send to Google Apps Script
                fetch(SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: 'signup', email, password: pass, name, address, cscId, mobile: mob })
                })
                .then(() => {
                    showStatus('✅ Registration successful! You can now sign in.', 'success');
                    btn.disabled = false;
                    setTimeout(() => setMode('login'), 2200);
                })
                .catch(() => {
                    showStatus('✅ Registration saved locally! You can sign in now.', 'success');
                    btn.disabled = false;
                    setTimeout(() => setMode('login'), 2200);
                });

            /* ── LOGIN ── */
            } else {
                btn.disabled = true;
                showStatus('⏳ Connecting to server…', 'info');

                // Load profile from localStorage
                const users = JSON.parse(localStorage.getItem('csc_users') || '{}');
                if (users[email]) {
                    localStorage.setItem('csc_loggedIn', JSON.stringify(users[email]));
                }

                fetch(SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: 'login', email, password: pass })
                })
                .then(() => {
                    // If no local profile exists, store minimal info
                    if (!users[email]) {
                        localStorage.setItem('csc_loggedIn', JSON.stringify({ email, name: '', address: '', cscId: '', mob: '' }));
                    }
                    showStatus('✅ Login successful! Redirecting…', 'success');
                    setTimeout(() => { window.location.href = 'after_log.html'; }, 1500);
                })
                .catch(() => {
                    showStatus('❌ Connection error. Please try again.', 'error');
                    btn.disabled = false;
                });
            }
        });
    </script>

</body>
</html>
